<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#F7F9F8"/>
  <rect x="0" y="0" width="8" height="630" fill="#2A7C6F"/>
  <text x="80" y="200" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#2A7C6F">Sumimasen</text>
  <text x="80" y="290" font-family="system-ui, sans-serif" font-size="32" fill="#1A2421" font-weight="bold">The Japan guide that tells you what</text>
